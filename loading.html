<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body {
            background:black;
            color:lime;
            font-family:monospace;
            text-align:center;
            margin-top:20%;
        }
    </style>
</head>

<body>

<h1>Loading...</h1>
<p>Starting game...</p>

<script>
let game = localStorage.getItem("nextGame");

// safety check
if(!game){
    window.location.href = "arcade.html";
}

// fake loading delay (Coolmath style feel)
setTimeout(() => {

    if(game === "snake"){
        window.location.href = "games/SNAKE%20GAME.html";
    }

    else if(game === "clicker"){
        window.location.href = "games/CLICKER%20GAME.html";
    }

    else if(game === "dodge"){
        window.location.href = "games/DODGE%20GAME.html";
    }

    else {
        window.location.href = "arcade.html";
    }

}, 900);
</script>

</body>
</html>
