<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body {
            background:black;
            color:lime;
            font-family:monospace;
            text-align:center;
            margin-top:20%;
        }
    </style>
</head>

<body>

<h1>Loading...</h1>
<p>Starting game...</p>

<script>
let game = localStorage.getItem("nextGame");

if(!game){
    window.location.href = "arcade.html";
}

setTimeout(()=>{
    window.location.href = "games/" + game + ".html";
}, 800);
</script>

</body>
</html>
