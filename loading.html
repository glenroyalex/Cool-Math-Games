<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>

<style>
body{
    margin:0;
    background:#0f1220;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

.box{
    text-align:center;
}

.bar{
    width:300px;
    height:20px;
    background:#22284a;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.fill{
    height:100%;
    width:0%;
    background:#4cafef;
    transition:0.2s;
}

.text{
    margin-top:15px;
    opacity:0.8;
}
</style>

</head>

<body>

<div class="box">
    <h1>🎮 Loading Game...</h1>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div class="text" id="text">Preparing game files...</div>
</div>

<script>
window.onload = () => {

    let game = localStorage.getItem("nextGame");

    let progress = 0;

    let fill = document.getElementById("fill");
    let text = document.getElementById("text");

    let messages = [
        "Connecting to server...",
        "Loading assets...",
        "Rendering world...",
        "Almost ready...",
        "Finalising..."
    ];

    let interval = setInterval(() => {

        progress += Math.random() * 15;
        if(progress > 100) progress = 100;

        fill.style.width = progress + "%";

        let msgIndex = Math.floor(progress / 20);
        text.innerText = messages[msgIndex] || "Starting...";

        if(progress >= 100){
            clearInterval(interval);

            setTimeout(() => {

                if(game === "clicker"){
                    window.location.href = "games/CLICKER%20GAME.html";
                }

                else if(game === "snake"){
                    window.location.href = "games/SNAKE%20GAME.html";
                }

                else if(game === "dodge"){
                    window.location.href = "games/DODGE%20GAME.html";
                }

                else{
                    window.location.href = "arcade.html";
                }

            }, 500);

        }

    }, 200);

};
</script>

</body>
</html>
