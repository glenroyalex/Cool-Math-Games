<!DOCTYPE html>
<html>
<head>
<title>Cool Arcade</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f1220;
    color:white;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#1b1f36;
    align-items:center;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:15px;
    padding:20px;
}

.game{
    background:#22284a;
    padding:20px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.game:hover{
    transform:scale(1.05);
    background:#2d3563;
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

button{
    padding:8px 12px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="topbar">
    <div>🎮 COOL ARCADE</div>

    <div>
        👤 <span id="username">Guest</span> |
        ⭐ XP: <span id="xp">0</span> |
        🏆 Lvl: <span id="lvl">1</span>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<div class="games">
    <div class="game" id="clicker">🖱 Clicker</div>
    <div class="game" id="snake">🐍 Snake</div>
    <div class="game" id="dodge">🏃 Dodge</div>
</div>

<script>
window.onload = () => {

    // 👤 LOGIN CHECK
    let user = localStorage.getItem("activeUser");

    if(!user){
        window.location.href = "login.html";
        return;
    }

    document.getElementById("username").innerText = user;

    // 💾 LOAD DATA
    let data = JSON.parse(localStorage.getItem("user_" + user)) || {
        xp: 0,
        level: 1
    };

    let xp = data.xp;
    let level = data.level;

    function save(){
        localStorage.setItem("user_" + user, JSON.stringify({xp, level}));
    }

    function update(){
        document.getElementById("xp").innerText = xp;
        document.getElementById("lvl").innerText = level;
    }

    update();

    // 🎮 OPEN GAME (SAME TAB)
    function openGame(name){
        localStorage.setItem("nextGame", name);
        window.location.href = "loading.html";
    }

    // 🏆 GAME UNLOCKS
    function checkUnlocks(){

        document.getElementById("clicker").onclick = () => openGame("clicker");

        let snake = document.getElementById("snake");
        let dodge = document.getElementById("dodge");

        if(level >= 2){
            snake.onclick = () => openGame("snake");
        } else {
            snake.classList.add("locked");
            snake.innerText = "🐍 Snake (Lvl 2)";
        }

        if(level >= 3){
            dodge.onclick = () => openGame("dodge");
        } else {
            dodge.classList.add("locked");
            dodge.innerText = "🏃 Dodge (Lvl 3)";
        }
    }

    checkUnlocks();

    // 🚪 LOGOUT
    window.logout = () => {
        localStorage.removeItem("activeUser");
        window.location.href = "login.html";
    };

};
</script>

</body>
</html>
