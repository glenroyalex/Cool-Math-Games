<!DOCTYPE html>
<html>
<head>
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 Arcade Hub</h1>

<div class="hud">
    ⭐ XP: <span id="xpText">0</span> |
    🏆 Level: <span id="levelText">1</span>
</div>

<p>Click a game to play</p>

<div class="menu">

    <div class="card" id="snakeBtn">🐍 Snake</div>
    <div class="card" id="clickerBtn">🖱️ Clicker</div>
    <div class="card" id="dodgeBtn">🏃 Dodge</div>

</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

function save(){
    localStorage.setItem("xp", xp);
    localStorage.setItem("level", level);
}

function addXP(amount){
    xp += amount;

    // LEVEL SYSTEM
    if(xp >= 100 && level === 1){
        level = 2;
        alert("Level Up! Snake unlocked 🐍");
    }
    if(xp >= 250 && level === 2){
        level = 3;
        alert("Level Up! Dodge unlocked 🏃");
    }

    save();
    updateHUD();
}

function updateHUD(){
    document.getElementById("xpText").innerText = xp;
    document.getElementById("levelText").innerText = level;
}
updateHUD();

window.onload = () => {

    const snakeBtn = document.getElementById("snakeBtn");
    const clickerBtn = document.getElementById("clickerBtn");
    const dodgeBtn = document.getElementById("dodgeBtn");

    clickerBtn.onclick = () => openGame("clicker");

    if(level >= 2){
        snakeBtn.onclick = () => openGame("snake");
    } else {
        snakeBtn.innerText = "🐍 Snake (Lvl 2)";
        snakeBtn.classList.add("locked");
    }

    if(level >= 3){
        dodgeBtn.onclick = () => openGame("dodge");
    } else {
        dodgeBtn.innerText = "🏃 Dodge (Lvl 3)";
        dodgeBtn.classList.add("locked");
    }
};

function openGame(game){
    localStorage.setItem("nextGame", game);
    window.location.href = "loading.html";
}

document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase() === "m"){
        window.location.href = "arcade.html";
    }
});
</script>

</body>
</html>
