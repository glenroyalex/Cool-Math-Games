<!DOCTYPE html>
<html>
<head>
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 Arcade Hub</h1>

<div class="hud">
    ⭐ XP: <span id="xpText">0</span> |
    🏆 Level: <span id="levelText">1</span>
</div>

<p>Press <b>M</b> to return to Math Hub</p>

<div class="menu">

<div class="card" onclick="location.href='games/snake.html'">🐍 Snake</div>
<div class="card" onclick="location.href='games/clicker.html'">🖱️ Clicker</div>
<div class="card" onclick="location.href='games/dodge.html'">🏃 Dodge</div>

</div>

<hr>

<!-- 🐍 SNAKE -->
<div id="snake" class="game hidden">
    <h2>🐍 Snake</h2>
    <canvas id="snakeCanvas" width="300" height="300"></canvas>
    <p>Score: <span id="snakeScore">0</span></p>
</div>

<!-- 🖱️ CLICKER -->
<div id="clicker" class="game hidden">
    <h2>🖱️ Clicker Game</h2>

    <button onclick="click()">Click Me</button>

    <p>Coins: <span id="coins">0</span></p>

    <button onclick="upgrade()">Upgrade (+1 per click, cost 10)</button>
</div>

<!-- 🏃 DODGE -->
<div id="dodge" class="game hidden">
    <h2>🏃 Dodge Game</h2>
    <canvas id="dodgeCanvas" width="300" height="300"></canvas>
    <p>Score: <span id="dodgeScore">0</span></p>
</div>

<script>

let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

function addXP(amount){
    xp += amount;

    let need = level * 50;

    if(xp >= need){
        xp -= need;
        level++;
        alert("🎉 Level Up! Level " + level);
    }

    localStorage.setItem("xp", xp);
    localStorage.setItem("level", level);

    updateHUD();
}

function updateHUD(){
    document.getElementById("xpText").innerText = xp;
    document.getElementById("levelText").innerText = level;
}

updateHUD();

/* NAV */
function showGame(id){
    document.querySelectorAll(".game").forEach(g=>g.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

/* BACK TO MAIN */
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()=="m"){
        window.location.href="index.html";
    }
});

/* ================= SNAKE ================= */
let canvas = document.getElementById("snakeCanvas");
let ctx = canvas.getContext("2d");

let snake = [{x:5,y:5}];
let dir = "right";
let food = {x:10,y:10};
let snakeScore = 0;

document.addEventListener("keydown",e=>{
    if(e.key=="ArrowUp")dir="up";
    if(e.key=="ArrowDown")dir="down";
    if(e.key=="ArrowLeft")dir="left";
    if(e.key=="ArrowRight")dir="right";
});

function snakeGame(){

    let head = {...snake[0]};

    if(dir=="right")head.x++;
    if(dir=="left")head.x--;
    if(dir=="up")head.y--;
    if(dir=="down")head.y++;

    snake.unshift(head);

    if(head.x==food.x && head.y==food.y){
        snakeScore++;
        addXP(10);

        food = {
            x: Math.floor(Math.random()*15),
            y: Math.floor(Math.random()*15)
        };

        document.getElementById("snakeScore").innerText = snakeScore;
    } else {
        snake.pop();
    }

    ctx.clearRect(0,0,300,300);

    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,20,20);

    ctx.fillStyle="lime";
    snake.forEach(s=>{
        ctx.fillRect(s.x*20,s.y*20,20,20);
    });
}

setInterval(snakeGame,150);

/* ================= CLICKER ================= */
let coins = parseInt(localStorage.getItem("coins")) || 0;
let power = 1;

function click(){
    coins += power;
    addXP(1);
    updateClicker();
}

function upgrade(){
    if(coins >= 10){
        coins -= 10;
        power++;
        updateClicker();
    }
}

function updateClicker(){
    document.getElementById("coins").innerText = coins;
    localStorage.setItem("coins", coins);
}

updateClicker();

/* ================= DODGE ================= */
let dcanvas = document.getElementById("dodgeCanvas");
let dctx = dcanvas.getContext("2d");

let player = {x:150,y:250};
let enemies = [];
let dodgeScore = 0;

document.addEventListener("keydown",e=>{
    if(e.key=="a")player.x-=10;
    if(e.key=="d")player.x+=10;
});

function dodgeGame(){

    if(Math.random()<0.04){
        enemies.push({x:Math.random()*280,y:0});
    }

    dctx.clearRect(0,0,300,300);

    dctx.fillStyle="blue";
    dctx.fillRect(player.x,player.y,20,20);

    dctx.fillStyle="red";

    enemies.forEach((e,i)=>{
        e.y += 3;

        dctx.fillRect(e.x,e.y,20,20);

        if(e.y>300){
            enemies.splice(i,1);
            dodgeScore++;
            addXP(5);
            document.getElementById("dodgeScore").innerText = dodgeScore;
        }

        if(
            e.x < player.x+20 &&
            e.x+20 > player.x &&
            e.y < player.y+20 &&
            e.y+20 > player.y
        ){
            alert("💀 Game Over! Score: " + dodgeScore);
            location.reload();
        }
    });
}

setInterval(dodgeGame,50);

</script>

</body>
</html>
