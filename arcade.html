<!DOCTYPE html>
<html>
<head>
    <title>Cool Arcade</title>
    <link rel="stylesheet" href="style.css">

<style>
body {
    background:#0b0b0b;
    color:lime;
    font-family:monospace;
    margin:0;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-bottom:2px solid lime;
}

/* GRID MENU */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:15px;
    padding:20px;
}

/* GAME CARD */
.card {
    border:2px solid lime;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    background:#050505;
}

.card:hover {
    transform:scale(1.1);
    box-shadow:0 0 10px lime;
}

.locked {
    opacity:0.3;
    cursor:not-allowed;
}

/* CATEGORY */
.sectionTitle {
    margin:20px;
    font-size:18px;
    border-left:4px solid lime;
    padding-left:10px;
}
</style>

</head>

<body>

<div class="topbar">
    <div>🎮 COOL ARCADE</div>
    <div>⭐ XP: <span id="xp">0</span> | 🏆 Lvl: <span id="lvl">1</span></div>
</div>

<div class="sectionTitle">🔥 Featured Games</div>

<div class="grid">

    <div class="card" onclick="openGame('clicker')">🖱️ Clicker</div>

    <div class="card" id="snake">
        🐍 Snake
    </div>

    <div class="card" id="dodge">
        🏃 Dodge
    </div>

    <div class="card" onclick="openGame('memory')">🧠 Memory Flip</div>

    <div class="card" onclick="openGame('reaction')">⚡ Reaction Test</div>

</div>

<script>

let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

function update(){
    document.getElementById("xp").innerText = xp;
    document.getElementById("lvl").innerText = level;
}
update();

/* 🔓 UNLOCK SYSTEM */
function unlocks(){

    let snake = document.getElementById("snake");
    let dodge = document.getElementById("dodge");

    if(level >= 2){
        snake.onclick = () => openGame("snake");
    } else {
        snake.classList.add("locked");
        snake.innerText = "🐍 Snake (Lvl 2)";
    }

    if(level >= 3){
        dodge.onclick = () => openGame("dodge");
    } else {
        dodge.classList.add("locked");
        dodge.innerText = "🏃 Dodge (Lvl 3)";
    }
}

unlocks();

/* 🎮 OPEN GAME */
function openGame(game){
    localStorage.setItem("nextGame", game);
    window.location.href = "loading.html";
}

/* 🧠 KEY EXIT */
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()=="m"){
        window.location.href="arcade.html";
    }
});

</script>

</body>
</html>
