<!DOCTYPE html>
<html>
<head>
    <title>Study Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📚 Study Notes</h1>

<p>3 × 4 = 12</p>
<p>5 + 7 = 12</p>
<p>10 ÷ 2 = 5</p>

<hr>

<h2>Math Games</h2>

<div class="card" onclick="startAdd()">➕ Addition Game</div>
<div class="card" onclick="startMul()">✖️ Multiplication Game</div>

<script>
function startAdd() {
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);

    let ans = prompt(a + " + " + b + " = ?");
    alert(ans == a + b ? "Correct!" : "Wrong!");
}

function startMul() {
    let a = Math.floor(Math.random()*12);
    let b = Math.floor(Math.random()*12);

    let ans = prompt(a + " × " + b + " = ?");
    alert(ans == a * b ? "Correct!" : "Wrong!");
}
</script>

</body>
</html>
