<!DOCTYPE html>
<html>
<head>
    <title>Study Notes Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body tabindex="0">

<h1>📚 Study Notes Hub</h1>
<p>Press <b>G</b> to go to Games</p>

<div class="menu">

    <div class="card" onclick="show('perimeter')">📏 Perimeter</div>
    <div class="card" onclick="show('pythag')">🟦 Pythagoras</div>
    <div class="card" onclick="show('area')">🔷 Area</div>

</div>

<hr>

<!-- 📏 PERIMETER -->
<div id="perimeter" class="section hidden">
    <h2>📏 Perimeter</h2>

    <p>Sides: 5, 7, 3</p>

    <input id="periAns" placeholder="Your answer">
    <button onclick="checkPeri()">Check</button>

    <p id="periResult"></p>
</div>

<!-- 🟦 PYTHAGORAS -->
<div id="pythag" class="section hidden">
    <h2>🟦 Pythagoras</h2>

    <p>a = 3, b = 4 → find c</p>

    <input id="pyAns" placeholder="c value">
    <button onclick="checkPythag()">Check</button>

    <p id="pyResult"></p>
</div>

<!-- 🔷 AREA -->
<div id="area" class="section hidden">
    <h2>🔷 Area of Rectangle</h2>

    <p>Width = 6, Height = 4</p>

    <input id="areaAns" placeholder="Area">
    <button onclick="checkArea()">Check</button>

    <p id="areaResult"></p>
</div>

<script>

/* NAV */
function show(id){
    document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

/* 📏 PERIMETER */
function checkPeri(){
    let correct = 5 + 7 + 3;
    let ans = document.getElementById("periAns").value;

    document.getElementById("periResult").innerText =
        (ans == correct) ? "✅ Correct!" : "❌ Wrong (Answer = " + correct + ")";
}

/* 🟦 PYTHAGORAS */
function checkPythag(){
    let correct = Math.sqrt(3*3 + 4*4);
    let ans = parseFloat(document.getElementById("pyAns").value);

    document.getElementById("pyResult").innerText =
        (Math.abs(ans - correct) < 0.01)
        ? "✅ Correct!"
        : "❌ Wrong (Answer = " + correct.toFixed(2) + ")";
}

/* 🔷 AREA */
function checkArea(){
    let correct = 6 * 4;
    let ans = document.getElementById("areaAns").value;

    document.getElementById("areaResult").innerText =
        (ans == correct) ? "✅ Correct!" : "❌ Wrong (Answer = " + correct + ")";
}

/* G KEY */
document.addEventListener("keydown", (e) => {
    if(e.key.toLowerCase() === "g"){
        window.location.href = "arcade.html";
    }
});

/* focus fix */
window.onload = () => document.body.focus();

</script>

</body>
</html>
