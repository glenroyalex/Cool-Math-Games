<!DOCTYPE html>
<html>
<head>
    <title>Study Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body tabindex="0">

<h1>📚 Study Notes</h1>

<p>3 × 4 = 12</p>
<p>5 + 7 = 12</p>
<p>10 ÷ 2 = 5</p>

<hr>

<h2>🎮 Math Games</h2>

<div class="card" onclick="addGame()">➕ Addition Game</div>
<div class="card" onclick="mulGame()">✖️ Multiplication Game</div>

<script>
function addGame() {
    let a = Math.floor(Math.random()*10);
    let b = Math.floor(Math.random()*10);

    let ans = prompt(a + " + " + b + " = ?");
    alert(ans == a + b ? "Correct!" : "Wrong!");
}

function mulGame() {
    let a = Math.floor(Math.random()*12);
    let b = Math.floor(Math.random()*12);

    let ans = prompt(a + " × " + b + " = ?");
    alert(ans == a * b ? "Correct!" : "Wrong!");
}

/* 🔥 FIX KEYBOARD RELIABILITY */
window.addEventListener("load", () => {
    document.body.focus();
});

document.addEventListener("keydown", function(e) {
    if (e.key.toLowerCase() === "g") {
        window.location.href = "arcade.html";
    }
});
</script>

</body>
</html>
