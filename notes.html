<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
    📝 Notes App
</div>

<div class="container">

    <!-- LEFT: SECTIONS -->
    <div class="sidebar">

        <button onclick="openNote('math')">📘 Math</button>
        <button onclick="openNote('science')">🔬 Science</button>
        <button onclick="openNote('english')">📖 English</button>
        <button onclick="openNote('free')">🗒️ Free Notes</button>

    </div>

    <!-- RIGHT: EDITOR -->
    <div class="editor">

        <h2 id="title">Math Notes</h2>

        <textarea id="noteArea" placeholder="Type your notes here..."></textarea>

    </div>

</div>

<script>
let current = "math";

/* load saved note */
function loadNote(name){
    document.getElementById("noteArea").value =
        localStorage.getItem(name) || "";
}

/* switch sections */
function openNote(name){
    saveNote(); // save current first
    current = name;

    document.getElementById("title").innerText =
        name.charAt(0).toUpperCase() + name.slice(1) + " Notes";

    loadNote(name);
}

/* save notes */
function saveNote(){
    localStorage.setItem(
        current,
        document.getElementById("noteArea").value
    );
}

/* auto-save while typing */
document.getElementById("noteArea").addEventListener("input", saveNote);

/* default load */
loadNote("math");
</script>

</body>
</html>
