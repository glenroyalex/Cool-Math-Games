<!DOCTYPE html>
<html>
<head>
    <title>cool maths games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>cool maths games</h1></h1>

<p>Press <b>G</b> for Games or <b>N</b> for Notes</p>

<div class="menu">

    <div class="card" onclick="goNotes()">
        📚 Notes
    </div>

    <div class="card" onclick="goGames()">
        🕹️ Games
    </div>

</div>

<script>
function goNotes() {
    window.location.href = "notes.html";
}

function goGames() {
    window.location.href = "arcade.html";
}

// keyboard support
document.addEventListener("keydown", function(e) {
    if (e.key.toLowerCase() === "g") {
        goGames();
    }
    if (e.key.toLowerCase() === "n") {
        goNotes();
    }
});
</script>

</body>
</html>
