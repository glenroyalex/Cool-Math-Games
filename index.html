<!DOCTYPE html>
<html>
<head>
    <title>Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🏠 HOME MENU -->
<div id="homeScreen" class="screen active">

    <h1>🎮 Game Hub</h1>

    <div class="menu">

        <div class="card" onclick="showScreen('notes')">
            📚 Study Notes
        </div>

        <div class="card" onclick="showScreen('games')">
            🕹️ Arcade Games
        </div>

        <div class="card" onclick="showScreen('scores')">
            🏆 High Scores
        </div>

    </div>
</div>

<!-- 📚 NOTES -->
<div id="notesScreen" class="screen">

    <h2>Study Notes</h2>

    <p>3 × 4 = 12</p>
    <p>5 + 7 = 12</p>

    <button onclick="showScreen('home')">⬅ Back</button>
</div>

<!-- 🎮 GAMES -->
<div id="gamesScreen" class="screen">

    <h2>Arcade Games</h2>

    <div class="card" onclick="openGame('games/snake.html')">🐍 Snake</div>
    <div class="card" onclick="openGame('games/dodge.html')">⚡ Dodge</div>
    <div class="card" onclick="openGame('games/clicker.html')">👆 Clicker</div>

    <button onclick="showScreen('home')">⬅ Back</button>
</div>

<!-- 🏆 SCORES -->
<div id="scoresScreen" class="screen">

    <h2>High Scores</h2>

    <p>Clicker Score: <span id="clickerScore"></span></p>

    <button onclick="resetScores()">Reset Scores</button>
    <button onclick="showScreen('home')">⬅ Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
