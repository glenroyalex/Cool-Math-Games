<!DOCTYPE html>
<html>
<head>
<script src="../games/effects.js"></script>
    <title>Clicker</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>🖱️ Clicker Game</h1>
<p>Press M to go back</p>

<button onclick="click()">Click!</button>

<p>Coins: <span id="coins">0</span></p>
<p>Power: <span id="power">1</span></p>

<button onclick="upgrade()">Upgrade (Cost: 10)</button>

<script>

let coins = parseInt(localStorage.getItem("coins")) || 0;
let power = parseInt(localStorage.getItem("power")) || 1;

let xp = parseInt(localStorage.getItem("xp")) || 0;

function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("power", power);
    localStorage.setItem("xp", xp);
}

function click(){
    coins += power;
    xp += 1;
    update();
    save();
}

function upgrade(){
    if(coins >= 10){
        coins -= 10;
        power++;
        update();
        save();
    }
}

function update(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("power").innerText = power;
}

update();

document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()=="m"){
        window.location.href="../arcade.html";
    }
});
playSound("click");
spawnXP(event.clientX, event.clientY);
</script>
</body>
</html>
