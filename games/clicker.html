<!DOCTYPE html>
<html>
<head>
   <script>
let xp = parseInt(localStorage.getItem("xp")) || 0;

function addXP(amount){
    xp += amount;
    localStorage.setItem("xp", xp);
    playSound("xp");
    screenFlash();
}

/* 🔊 SOUND SYSTEM (optional files later) */
function playSound(type){
    let sounds = {
        click: "click.mp3",
        xp: "xp.mp3",
        hit: "hit.mp3"
    };

    let audio = new Audio(sounds[type]);
    audio.volume = 0.3;
    audio.play().catch(()=>{});
}

/* ✨ SCREEN FLASH (Coolmath feel) */
function screenFlash(){
    document.body.style.filter = "brightness(2)";
    setTimeout(()=>{
        document.body.style.filter = "brightness(1)";
    },100);
}
</script>
   <script>
function exitGame(){
    window.location.href = "../arcade.html";
}

document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase() === "m"){
        exitGame();
    }
});
</script>
    <title>Clicker</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>🖱️ Clicker</h1>
<p>M to exit</p>

<button onclick="clicker()">Click</button>

<p>Coins: <span id="coins">0</span></p>
<p>Power: <span id="power">1</span></p>

<button onclick="upgrade()">Upgrade (10 coins)</button>

<script>

let coins = parseInt(localStorage.getItem("coins")) || 0;
let power = parseInt(localStorage.getItem("power")) || 1;
let xp = parseInt(localStorage.getItem("xp")) || 0;

function clicker(){
    coins += power;
    xp += 1;

    update();
    save();
}

function upgrade(){
    if(coins >= 10){
        coins -= 10;
        power++;
        update();
        save();
    }
}

function update(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("power").innerText = power;
}

function save(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("power", power);
    localStorage.setItem("xp", xp);
}

update();

document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase()=="m"){
        window.location.href="../arcade.html";
    }
});

</script>

</body>
</html>
