<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
</head>
<body style="background:black; color:lime; text-align:center;">

<h1>🐍 Snake (Simple)</h1>

<p>Use arrow keys</p>

<p id="dir">Direction: None</p>

<script>
document.addEventListener("keydown", function(e) {
    document.getElementById("dir").innerText =
        "Direction: " + e.key;
});
</script>

</body>
</html>
