<!DOCTYPE html>
<html>
<head>
<title>Reaction Test</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>⚡ Reaction Test</h1>
<p>Wait for green... then click!</p>

<button id="btn">WAIT</button>

<script>

let ready = false;

let btn = document.getElementById("btn");

setTimeout(()=>{
    btn.innerText = "CLICK!";
    btn.style.background = "lime";
    ready = true;
}, Math.random()*3000 + 1000);

btn.onclick = ()=>{

    if(ready){
        addXP(10);
        alert("Good reaction!");
        location.reload();
    } else {
        alert("Too early!");
    }
};

document.addEventListener("keydown",e=>{
    if(e.key.toLowerCase()=="m"){
        window.location.href="../arcade.html";
    }
});
</script>

</body>
</html>
